# protocol.yaml — AgentMesh orchestrator interaction protocol
# Single source of truth for all event types fired by agents.
# Used by build.sh (event table generation) and orchestrator.py (dispatch validation).

events:
  questions:
    fired_by: [implementer, planner, brainstormer, designer, investigator, ticketer]
    next_state: doing
    requires_user_input: true
    meaning: "Agent has questions for the user"

  plan-ready:
    fired_by: [implementer, planner]
    next_state: doing
    requires_user_input: false
    meaning: "Plan note written (first submission), awaiting review"

  plan-revised:
    fired_by: [implementer]
    next_state: doing
    requires_user_input: false
    meaning: "Plan revised after reviewer feedback; re-review requested"

  pr-ready:
    fired_by: [implementer]
    url_bearing: true
    next_state: doing
    requires_user_input: false
    meaning: "PR created, signaling readiness to orchestrator"

  pr-revised:
    fired_by: [implementer]
    url_bearing: true
    next_state: doing
    requires_user_input: false
    meaning: "PR revised after reviewer feedback; re-review requested"

  pr-ready-final:
    fired_by: [implementer]
    url_bearing: true
    next_state: doing
    requires_user_input: true
    meaning: "PR ready for user approval — no further automated review needed"

  confluence-ready:
    fired_by: [documenter]
    url_bearing: true
    next_state: doing
    requires_user_input: true
    meaning: "Confluence page created/updated in personal space, awaiting user review — no PR created"

  ideas-ready:
    fired_by: [brainstormer]
    next_state: doing
    requires_user_input: true
    meaning: "IDEAS note ready for user feedback"

  selection-ready:
    fired_by: [brainstormer]
    next_state: doing
    requires_user_input: true
    meaning: "SELECTION note ready for user to check ideas"

  design-ready:
    fired_by: [designer]
    next_state: doing
    requires_user_input: true
    meaning: "DESIGN note written (first submission), awaiting user review"

  design-revised:
    fired_by: [designer]
    next_state: doing
    requires_user_input: true
    meaning: "Design revised after user feedback; re-review requested"

  research-ready:
    fired_by: [investigator]
    next_state: done
    requires_user_input: true
    meaning: "Research complete, Context notes written — awaiting user review and approval"

  completion:
    fired_by: [brainstormer, planner, designer]
    next_state: done
    requires_user_input: false
    meaning: "Subtasks created (or skipped), parent marked Done"

  tickets-draft:
    fired_by: [ticketer]
    next_state: doing
    requires_user_input: true
    meaning: "Ticket draft ready — awaiting user confirmation before creating in Atlassian"

  tickets-created:
    fired_by: [ticketer]
    next_state: done
    requires_user_input: false
    meaning: "Tickets successfully created in Jira — task auto-completed by orchestrator"

  plan-review-complete:
    fired_by: [plan-reviewer]
    next_state: doing
    requires_user_input: false
    meaning: "Plan review note written, summary in comment"

  pr-review-complete:
    fired_by: [pr-reviewer]
    next_state: doing
    requires_user_input: false
    meaning: "PR review posted to GitHub, summary in comment"
